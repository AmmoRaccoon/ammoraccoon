name: AmmoRaccoon Component Scraper

# Component prices (powder, primers, bullets, brass) change far less often
# than loaded-ammo prices, so this runs once daily instead of every 2 hours.
# 09:00 UTC = 04:00 America/Chicago during CDT, 03:00 during CST. Either
# way we land in the early-morning Central window — ammo scrape (cron
# every 2 hours) most recently fired at 08:00 UTC, and US daytime traffic
# doesn't pick up until ~13:00 UTC, so we own the window cleanly.
#
# Why a category matrix (one job per category, in parallel):
# The 2026-05-04 single-job run hit the 355-minute timeout mid-bullet, so
# brass never ran and bullets were partial. Telemetry from that run:
# powder ~30m / primer ~13m / bullet 5h+ (incomplete) / brass est ~70m.
# Bullet alone exceeds the serialized budget; parallel jobs give bullet
# its own 355-minute budget and let the other three complete unconditionally.
# Each runner has its own IP, so the robots.txt 10s crawl-delay still
# applies per job — we hit Powder Valley from 4 IPs at once, not 4× faster
# from one.
#
# Future option (path b) if bullet still doesn't complete in 355m on its
# own runner: split bullet into sub-jobs by manufacturer or A-Z slug range
# in the matrix. Holding off until we see whether path (a) here is enough.

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 355 < the runner's 360-minute hard cap so we exit gracefully a few
    # minutes early instead of being terminated mid-upsert.
    timeout-minutes: 355

    strategy:
      # One category failing must not cancel the others — each is independent.
      fail-fast: false
      matrix:
        category: [powder, primer, bullet, brass]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # No Playwright install here — the Powder Valley scraper is
      # requests-only (Cloudflare is in CDN/cache mode, no JS challenge).
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 python-dotenv "supabase==2.15.0"

      - name: Run Powder Valley component scraper (${{ matrix.category }})
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_powdervalley.py --category ${{ matrix.category }}
