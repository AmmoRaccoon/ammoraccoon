# ONE-OFF THROWAWAY DIAGNOSTIC — delete after use.
# Question (2026-07-05): do Shadowsmith and Wideners load from GitHub
# Actions' datacenter IPs? Both are Cloudflare-fronted. Local results
# that day: shadowsmith 403 (blocked), wideners 200 (open) — but
# Cloudflare treats GHA runner IPs differently than residential IPs
# (see the 2026-05-15 note in scraper_wideners.py: local 200, GHA dark
# since 2026-04-22), so only a run from a real runner answers this.
#
# READ-ONLY: fetches ONE category page per store, prints HTTP status +
# Cloudflare-challenge detection + byte count. No Supabase env, no DB
# writes, no saves, nothing re-wired. Manual trigger only — never cron.
name: ONE-OFF wall test (shadowsmith + wideners)

on:
  workflow_dispatch:

jobs:
  wall-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Fetch both stores (read-only)
        run: |
          python - <<'EOF'
          # Mirrors each scraper's real fetch approach:
          #  - shadowsmith: plain default page, no custom UA/headers
          #    (scraper_shadowsmith.py launches chromium bare).
          #  - wideners: fresh context w/ Chrome-124 UA, sec-ch-ua
          #    headers, 1366x2400 viewport, AutomationControlled off
          #    (scraper_wideners.py's _open_context_and_goto).
          import re
          from playwright.sync_api import sync_playwright

          CHALLENGE = re.compile(r'just a moment|cf-challenge|challenge-platform|__cf_chl', re.I)

          def report(name, resp, page):
              status = resp.status if resp else 'NO-RESPONSE'
              body = page.content()
              challenged = bool(CHALLENGE.search(body))
              print(f"RESULT {name}: HTTP {status} | cf-challenge={challenged} "
                    f"| bytes={len(body)} | landed={page.url}")

          with sync_playwright() as p:
              # --- shadowsmith, its scraper's way ---
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              try:
                  resp = page.goto(
                      'https://www.shadowsmith.net/product-category/ammunition/filters/caliber-gauge/9mm/',
                      wait_until='domcontentloaded', timeout=90000)
                  report('shadowsmith', resp, page)
              except Exception as e:
                  print(f"RESULT shadowsmith: FETCH-ERROR {e}")
              browser.close()

              # --- wideners, its scraper's way ---
              browser = p.chromium.launch(
                  headless=True,
                  args=['--disable-blink-features=AutomationControlled'])
              context = browser.new_context(
                  user_agent=('Mozilla/5.0 (Windows NT 10.0; Win64; x64) '
                              'AppleWebKit/537.36 (KHTML, like Gecko) '
                              'Chrome/124.0.0.0 Safari/537.36'),
                  viewport={'width': 1366, 'height': 2400},
                  extra_http_headers={
                      'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8',
                      'Accept-Language': 'en-US,en;q=0.9',
                      'Sec-Ch-Ua': '"Chromium";v="124", "Google Chrome";v="124", "Not-A.Brand";v="99"',
                      'Sec-Ch-Ua-Mobile': '?0',
                      'Sec-Ch-Ua-Platform': '"Windows"',
                      'Upgrade-Insecure-Requests': '1',
                  })
              page = context.new_page()
              try:
                  resp = page.goto(
                      'https://www.wideners.com/handgun/9mm-ammo',
                      wait_until='domcontentloaded', timeout=60000)
                  report('wideners', resp, page)
              except Exception as e:
                  print(f"RESULT wideners: FETCH-ERROR {e}")
              browser.close()
          EOF
