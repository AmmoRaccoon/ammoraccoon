name: AmmoRaccoon Scraper

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 python-dotenv playwright "supabase==2.15.0"
          playwright install chromium

      - name: Run Ammunition Depot scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_ammodeport.py

      - name: Run SGAmmo scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_sgammo.py

      - name: Run Lucky Gunner scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_luckygunner.py

      - name: Run PSA scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_psa.py

      - name: Run Target Sports USA scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_targetsports.py

      - name: Run AE Ammo scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_aeammo.py

      - name: Run Rivertown Munitions scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_rivertown.py

      - name: Run Ammo.com scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_ammocom.py

      - name: Run BulkAmmo scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_bulkammo.py

      - name: Run Trueshot Ammo scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_trueshot.py

      - name: Run Natchez scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_natchez.py

      - name: Run Wideners scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_wideners.py

      - name: Run Freedom Munitions scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_freedommunitions.py

      # Disabled: per-variant pricing on product pages causes low prices to be paired
      # with high round counts, producing phantom ~3¢/rd listings. Rewrite pending.
      # - name: Run Bereli scraper
      #   env:
      #     SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      #     SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      #   run: python scraper_bereli.py

      # New retailers — ids 20-36. Disabled by default until each scraper
      # has been verified against live DOM. Selectors are best-effort
      # Enabled 2026-04-25 — manual run confirmed 94 listings across
      # all 10 calibers with realistic prices ($0.07/rd .22 LR bulk to
      # $1.75/rd match-grade .308) after the URL/selector rewrite.
      - name: Run Bucking Horse Outpost scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_buckinghorse.py
      # Enabled 2026-04-25 — manual run confirmed 88 listings across
      # 8 covered calibers (.308 Win and .300 BLK have no RGW category
      # pages and are dropped from CALIBER_PATHS). Prices verified
      # against retail; 8 skips are products with no round-count
      # signal anywhere on site, honestly excluded to preserve CPR.
      - name: Run RecoilGunWorks scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_recoilgunworks.py
      # Enabled 2026-04-25 — manual run confirmed 194 listings across
      # all 10 calibers with 0 skips. CPR is rendered directly on each
      # card so total_rounds = base_price / displayed_cpr is exact.
      - name: Run Outdoor Limited scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_outdoorlimited.py
      # Enabled 2026-04-25 — manual run confirmed 122 listings across
      # all 10 calibers. 38 skips: 16 snap caps/dummy rounds (correctly
      # filtered), 21 products without round count in title, 1 sanity
      # rejection. Prices verified against retail.
      - name: Run Shadowsmith Ammo scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_shadowsmith.py
      # Enabled 2026-04-25 — manual run confirmed 62 listings across
      # all 10 calibers; 58 skips are all sold-out products where
      # WooCommerce omits the .price span (no current price to record).
      # Prices verified against retail.
      - name: Run Velocity Ammo Sales scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_velocity.py
      # Enabled 2026-04-25 — manual run confirmed 148 listings across
      # all 10 calibers. 46 skips: 29 are title-filter rejections on
      # mixed-caliber pages (.357 Mag in /other-handgun-calibers/,
      # .22 LR in /rimfire-ammo/), 17 missing round count in title.
      # Prices verified against retail.
      - name: Run Gritr Sports scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_gritr.py
      # Enabled 2026-04-25 — manual run confirmed 105 listings across
      # all 10 calibers with 0 skips. BigCommerce stencil same as
      # Buckinghorse; URL fixes per the scraper commit. Prices
      # verified against retail.
      - name: Run Ventura Munitions scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_ventura.py
      # DEFERRED 2026-04-25 — Bulk Munitions sits behind Cloudflare;
      # all 10 caliber URLs return HTTP 403 even from Playwright's
      # default Chromium fingerprint. Re-enable once we can route
      # through a residential proxy or a stealth-hardened browser
      # context that bypasses the WAF challenge.
      # - name: Run Bulk Munitions scraper
      #   env:
      #     SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      #     SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      #   run: python scraper_bulkmunitions.py
      # Enabled 2026-04-25 — manual run confirmed 29 listings across
      # the 5 calibers Gorilla actually carries (others were dropped
      # from CALIBER_PATHS rather than left to 404). Prices verified
      # against retail. See commit 1d62bd8.
      - name: Run Gorilla Ammunition scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_gorilla.py
      # Enabled 2026-04-25 — manual run confirmed 20 listings across
      # 9 calibers (7.62x39 OOS at GA). 3 skips are CCI .22 LR resells
      # without standard Npk variant labels. Variant grid is fetched
      # per-product since GA house-brand titles carry no round count.
      # See commit 38c396b.
      - name: Run Georgia Arms scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_georgiaarms.py
      # First scraper for retailer_id=6. Magento 2 storefront, no anti-bot.
      # Sitemap-driven discovery (~1800 in-scope PDPs after caliber filter
      # of the 4500-URL sitemap); each PDP carries clean Product JSON-LD
      # with name/mpn/brand/price/availability. v1 skips the ~1-2% of
      # OOS/discontinued PDPs that omit the Product schema. Crawl-delay
      # 5s (no robots.txt requirement). Recon doc:
      # scripts/ammoman_unit_mapping.md (web).
      - name: Run AmmoMan scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_ammoman.py
      # Enabled 2026-04-25 — manual run confirmed 289 listings across
      # all covered calibers; per-product variant-grid fetch capped at
      # 30 SKUs per caliber to fit the 2h cron budget. Single skip is
      # a single-variant Barnes SKU. See commit 19de400.
      - name: Run Black Basin scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_blackbasin.py
      # Enabled 2026-05-05 — first scraper for retailer_id=9. EpiServer
      # Commerce on Cloudflare CDN-mode (no anti-bot fight). v1 ingests
      # the SSR'd 32 cards from each of three parent ammo indexes
      # (handgun/rifle/rimfire) and filters by normalize_caliber from
      # the title — per-caliber URL slugs fall back to the parent index,
      # and pagination beyond page 1 is JS-driven (infinite scroll). Card
      # data-price + data-round give bulk-tier price/PPR directly without
      # PDP fetches. Recon doc: scripts/brownells_unit_mapping.md (web).
      - name: Run Brownells scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_brownells.py
      # First scraper for retailer_id=5. Custom PHP / osCommerce-derived
      # storefront on Cloudflare CDN-mode (no anti-bot). Card-based:
      # /search.php/type/ammo paginates 28 pages (data-total-results=1000
      # cap), each card has full schema.org Microdata so no PDP fetches
      # are needed. Filter is title-driven via normalize_caliber because
      # Bud's exposed caliber filter list is missing 4 of our 10 calibers
      # (380acp, 762x39, 300blk, 357mag). Recon doc:
      # scripts/buds_unit_mapping.md (web).
      - name: Run Bud's Gun Shop scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_buds.py
      # Enabled 2026-05-02 — manual 9mm + .223/5.56 run confirmed 84
      # listings (39 + 45) with 0 skips. Magento storefront with the
      # split-decimal price quirk ("$11 99") and OOS stash in hidden
      # data-price; both handled in the scraper.
      - name: Run Classic Firearms scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_classicfirearms.py
      # Enabled 2026-05-02 — manual handgun + rifle run (3 pages each)
      # saved 119 listings spanning 9 calibers with realistic prices.
      # BigCommerce stencil; site only buckets ammo by gun type so we
      # walk the three top-level type pages and normalize_caliber()
      # filters to our tracked list. High skip count is expected — most
      # rejections are off-list calibers (10mm, 45 ACP, 32-20 Win).
      - name: Run Dance's Sporting Goods scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_dancessportinggoods.py
      # Re-enabled 2026-05-07 — originally ran 2026-04-26 then dropped
      # off the cron entirely; smoke test today saved 18 rows across 5
      # calibers (9mm/380acp/40sw/223-556/300blk) in ~30 seconds.
      # Shopify storefront, no Playwright — uses /collections/<handle>/
      # products.json JSON feed for each tracked caliber. No anti-bot.
      - name: Run Fenix Ammunition scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_fenix.py
      # Re-enabled 2026-05-07 — originally ran 2026-04-26 then dropped
      # off the cron entirely; smoke test today verified selectors
      # (.productGrid article.card, h4.card-title a, data-product-id,
      # data-product-price-without-tax) all return expected counts via
      # Playwright. Site unchanged — earlier "restructure" diagnosis
      # was an artifact of probing with plain requests against a
      # JS-hydrated Stencil store. ~150 pages × ~5s = ~12-15 min/run.
      #
      # Diagnostic note for future agents: when a Playwright-based
      # scraper's selectors appear to "no longer match", probe with
      # Playwright too — not just requests. Stencil/Shopify/Magento
      # sites that hydrate via JS will look broken to plain HTTP even
      # when nothing has changed.
      - name: Run Firearms Depot scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_firearmsdepot.py
      # Enabled 2026-05-02 — manual 9mm + .223/5.56 run (3 pages each
      # facet) saved 148 listings with realistic prices. Magento behind
      # Cloudflare; layered-nav `?caliber=NNN` URLs 403 after 1-2 hits
      # in the same session, so each pagination page opens in a fresh
      # browser context. Combined-caliber facets (223+5.56, 308+7.62x51)
      # are scraped separately and deduped via seen_ids.
      - name: Run Gunbuyer scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_gunbuyer.py
      # Re-enabled 2026-05-07 — originally ran 2026-04-26 then dropped
      # off the cron entirely; smoke test today saved 12 listings across
      # 4 calibers (9mm/223-556/308win/762x39/380acp). Tiny boutique
      # catalog (~13-15 SKUs); sitemap.xml + Playwright per PDP. Site
      # uses legacy SiteBuilder/ASP.NET stencil; selectors verified
      # healthy (extrafieldsBlock, itemprop="price", h1 fallback chain).
      - name: Run KR Armory scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_krarmory.py
      # Re-enabled 2026-05-07 — originally ran 2026-04-26 then dropped
      # off the cron entirely; smoke test (MAX_PAGES=2 cap, reverted)
      # saved 68 listings spanning 9 calibers in ~3 minutes with no
      # Cloudflare 403s. Stealth-Playwright per the in-scraper comment;
      # the wall fires intermittently so first cron pass may yield
      # partial results — next pass picks up the rest.
      - name: Run Sportsman's Guide scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_sportsmansguide.py
      # Re-enabled 2026-05-07 — originally ran 2026-04-26 then dropped
      # off the cron entirely; smoke test saved 47 listings across 8
      # calibers. BigCommerce stencil with three usage-type parents
      # (handgun-defensive, rifle-target, rifle-hunting). Diagnosis
      # flagged that h4.card-title selector returns 0 hits in plain
      # HTML, but the scraper's OR-fallback (`a.card-figure__link,
      # h4.card-title a`) resolves correctly — titles populated.
      - name: Run Underwood Ammo scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_underwood.py

      - name: Scraper health check
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/health_check.py

      - name: Caliber pricing audit
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/caliber_audit.py