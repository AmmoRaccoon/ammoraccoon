name: AmmoRaccoon Scraper - Light

# Light-tier retailers: 22 fast scrapers (the SGAmmo through
# Georgia Arms block plus Black Basin), totalling ~35 minutes per
# run. Health check + caliber audit run here (with if: always())
# since this workflow is the lightest and most reliable per cron
# tick. Every scraper step is continue-on-error so one bad parse
# does not skip the rest.
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 python-dotenv playwright "supabase==2.15.0"
          playwright install chromium

      - name: Run SGAmmo scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_sgammo.py

      - name: Run Lucky Gunner scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_luckygunner.py

      - name: Run PSA scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_psa.py

      - name: Run Target Sports USA scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_targetsports.py

      - name: Run AE Ammo scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_aeammo.py

      - name: Run Rivertown Munitions scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_rivertown.py

      - name: Run Ammo.com scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_ammocom.py

      - name: Run BulkAmmo scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_bulkammo.py

      - name: Run Trueshot Ammo scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_trueshot.py

      - name: Run Natchez scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_natchez.py

      - name: Run Wideners scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_wideners.py

      - name: Run Freedom Munitions scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_freedommunitions.py

      # Enabled 2026-04-25 — manual run confirmed 289 listings across
      # all covered calibers; per-product variant-grid fetch capped at
      # 30 SKUs per caliber to fit the 2h cron budget. Single skip is
      # a single-variant Barnes SKU. See commit 19de400.
      #
      # Re-listed here 2026-05-08 after the cron split: Black Basin
      # has been silent for 9 days, but the silence overlaps exactly
      # with the exit-code cascade we just fixed in scrape.yml — every
      # post-AmmoMan step was getting skipped. This run will tell us
      # whether the scraper itself is broken or was just blocked.
      - name: Run Black Basin scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_blackbasin.py

      # Enabled 2026-04-25 — manual run confirmed 94 listings across
      # all 10 calibers with realistic prices ($0.07/rd .22 LR bulk to
      # $1.75/rd match-grade .308) after the URL/selector rewrite.
      - name: Run Bucking Horse Outpost scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_buckinghorse.py

      # Enabled 2026-04-25 — manual run confirmed 88 listings across
      # 8 covered calibers (.308 Win and .300 BLK have no RGW category
      # pages and are dropped from CALIBER_PATHS). Prices verified
      # against retail; 8 skips are products with no round-count
      # signal anywhere on site, honestly excluded to preserve CPR.
      - name: Run RecoilGunWorks scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_recoilgunworks.py

      # Enabled 2026-04-25 — manual run confirmed 194 listings across
      # all 10 calibers with 0 skips. CPR is rendered directly on each
      # card so total_rounds = base_price / displayed_cpr is exact.
      - name: Run Outdoor Limited scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_outdoorlimited.py

      # Enabled 2026-04-25 — manual run confirmed 122 listings across
      # all 10 calibers. 38 skips: 16 snap caps/dummy rounds (correctly
      # filtered), 21 products without round count in title, 1 sanity
      # rejection. Prices verified against retail.
      - name: Run Shadowsmith Ammo scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_shadowsmith.py

      # Enabled 2026-04-25 — manual run confirmed 62 listings across
      # all 10 calibers; 58 skips are all sold-out products where
      # WooCommerce omits the .price span (no current price to record).
      # Prices verified against retail.
      - name: Run Velocity Ammo Sales scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_velocity.py

      # Enabled 2026-04-25 — manual run confirmed 148 listings across
      # all 10 calibers. 46 skips: 29 are title-filter rejections on
      # mixed-caliber pages (.357 Mag in /other-handgun-calibers/,
      # .22 LR in /rimfire-ammo/), 17 missing round count in title.
      # Prices verified against retail.
      - name: Run Gritr Sports scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_gritr.py

      # Enabled 2026-04-25 — manual run confirmed 105 listings across
      # all 10 calibers with 0 skips. BigCommerce stencil same as
      # Buckinghorse; URL fixes per the scraper commit. Prices
      # verified against retail.
      - name: Run Ventura Munitions scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_ventura.py

      # Enabled 2026-04-25 — manual run confirmed 29 listings across
      # the 5 calibers Gorilla actually carries (others were dropped
      # from CALIBER_PATHS rather than left to 404). Prices verified
      # against retail. See commit 1d62bd8.
      - name: Run Gorilla Ammunition scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_gorilla.py

      # Enabled 2026-04-25 — manual run confirmed 20 listings across
      # 9 calibers (7.62x39 OOS at GA). 3 skips are CCI .22 LR resells
      # without standard Npk variant labels. Variant grid is fetched
      # per-product since GA house-brand titles carry no round count.
      # See commit 38c396b.
      - name: Run Georgia Arms scraper
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper_georgiaarms.py

      - name: Scraper health check
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/health_check.py

      - name: Caliber pricing audit
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/caliber_audit.py
